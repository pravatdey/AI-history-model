# Complete History Syllabus - UPSC & State PSC
# 180 Parts | Ancient → Medieval → Modern History
# Target: 6 months (1 part per day, ~20 minutes each)

syllabus:
  name: "Complete History - UPSC & State PSC"
  total_parts: 180
  target_duration_minutes: 20
  language: "hinglish"

  eras:
    # =========================================
    # ANCIENT HISTORY (Parts 1-55)
    # =========================================
    - name: "Ancient History"
      hindi_name: "प्राचीन इतिहास"
      color_theme: "ancient"
      parts_range: [1, 55]
      sections:

        # --- Sources of Indian History ---
        - name: "Sources of Indian History"
          topics:
            - part: 1
              title: "Introduction to Indian History & Sources"
              subtopics:
                - "Importance of studying Indian History for UPSC"
                - "Literary sources - Vedas, Puranas, Buddhist & Jain texts"
                - "Archaeological sources - Inscriptions, Coins, Monuments"
                - "Foreign accounts - Greek, Chinese, Arab travelers"
              key_concepts: ["Epigraphy", "Numismatics", "Archaeology", "Historiography"]
              exam_focus: "BOTH"
              previous_year_refs: ["UPSC 2019 - Epigraphy question", "UPSC 2017 - Archaeological sources"]

        # --- Prehistoric India ---
        - name: "Prehistoric India"
          topics:
            - part: 2
              title: "Stone Age - Paleolithic Period"
              subtopics:
                - "Lower Paleolithic - Hand axes, cleavers, choppers"
                - "Middle Paleolithic - Flake tools, scrapers"
                - "Upper Paleolithic - Blade tools, bone tools"
                - "Important Paleolithic sites - Bhimbetka, Hunsgi, Attirampakkam"
              key_concepts: ["Paleolithic", "Homo erectus", "Hunter-gatherers", "Bhimbetka"]
              exam_focus: "PRELIMS"
              previous_year_refs: ["UPSC 2020 - Bhimbetka caves"]

            - part: 3
              title: "Stone Age - Mesolithic & Neolithic Periods"
              subtopics:
                - "Mesolithic Age - Microliths, semi-permanent settlements"
                - "Important Mesolithic sites - Bagor, Adamgarh, Langhnaj"
                - "Neolithic Age - Agriculture revolution, polished stone tools"
                - "Important Neolithic sites - Burzahom, Mehrgarh, Chirand"
              key_concepts: ["Microliths", "Neolithic Revolution", "Mehrgarh", "Domestication"]
              exam_focus: "PRELIMS"
              previous_year_refs: ["UPSC 2018 - Neolithic sites"]

            - part: 4
              title: "Chalcolithic & Megalithic Cultures"
              subtopics:
                - "Chalcolithic Age - Copper-stone age cultures"
                - "Important sites - Ahar, Kayatha, Malwa, Jorwe"
                - "Iron Age & Megalithic culture"
                - "Painted Grey Ware & Northern Black Polished Ware"
              key_concepts: ["Chalcolithic", "Megalith", "PGW", "NBPW", "Ochre Coloured Pottery"]
              exam_focus: "PRELIMS"
              previous_year_refs: ["UPSC 2016 - Chalcolithic cultures"]

        # --- Indus Valley Civilization ---
        - name: "Indus Valley Civilization"
          topics:
            - part: 5
              title: "Indus Valley Civilization - Discovery & Extent"
              subtopics:
                - "Discovery by Dayaram Sahni & R.D. Banerji"
                - "Geographical extent - from Sutkagen-dor to Alamgirpur"
                - "Major sites - Harappa, Mohenjo-daro, Lothal, Dholavira"
                - "Phases - Early, Mature & Late Harappan"
              key_concepts: ["Harappa", "Mohenjo-daro", "Lothal", "Dholavira", "Rakhigarhi"]
              exam_focus: "BOTH"
              previous_year_refs: ["UPSC 2021 - IVC sites", "UPSC 2019 - Dholavira"]

            - part: 6
              title: "Indus Valley - Town Planning & Architecture"
              subtopics:
                - "Grid pattern town planning, citadel & lower town"
                - "Great Bath of Mohenjo-daro"
                - "Granaries, dockyard at Lothal"
                - "Drainage system & water management"
              key_concepts: ["Great Bath", "Citadel", "Grid Planning", "Dockyard"]
              exam_focus: "BOTH"
              previous_year_refs: ["UPSC 2020 - Town planning features"]

            - part: 7
              title: "Indus Valley - Economy, Religion & Decline"
              subtopics:
                - "Agriculture - wheat, barley, cotton, rice"
                - "Trade & commerce - weights, seals, ports"
                - "Religion - Mother Goddess, Proto-Shiva, tree worship"
                - "Script & decline theories"
              key_concepts: ["Pashupati Seal", "Mother Goddess", "IVC Script", "Trade networks"]
              exam_focus: "BOTH"
              previous_year_refs: ["UPSC 2018 - IVC religion"]

        # --- Vedic Period ---
        - name: "Vedic Period"
          topics:
            - part: 8
              title: "Early Vedic Period (Rig Vedic Age)"
              subtopics:
                - "Aryan migration debate & Rig Veda"
                - "Political organization - Jana, Vis, Grama, Kula"
                - "Sabha & Samiti - tribal assemblies"
                - "Social life, economy & religion of Rig Vedic people"
              key_concepts: ["Rig Veda", "Sabha", "Samiti", "Indra", "Varuna", "Pastoral economy"]
              exam_focus: "BOTH"
              previous_year_refs: ["UPSC 2017 - Vedic assemblies"]

            - part: 9
              title: "Later Vedic Period"
              subtopics:
                - "Expansion to Gangetic plains"
                - "Political changes - Rise of kingdoms, Ashvamedha"
                - "Social changes - Varna system rigidity, position of women"
                - "Religious changes - Prajapati, Brahmanical supremacy"
              key_concepts: ["Ashvamedha", "Varna System", "Prajapati", "Upanishads"]
              exam_focus: "BOTH"
              previous_year_refs: ["UPSC 2019 - Later Vedic society"]

            - part: 10
              title: "Vedic Literature & Philosophy"
              subtopics:
                - "Four Vedas - Rig, Sama, Yajur, Atharva"
                - "Brahmanas, Aranyakas, Upanishads"
                - "Vedangas & Upavedas"
                - "Philosophical concepts - Karma, Dharma, Moksha"
              key_concepts: ["Vedas", "Upanishads", "Brahmanas", "Aranyakas", "Vedangas"]
              exam_focus: "BOTH"
              previous_year_refs: ["UPSC 2020 - Upanishadic philosophy"]

        # --- Jainism & Buddhism ---
        - name: "Jainism & Buddhism"
          topics:
            - part: 11
              title: "Rise of Heterodox Sects - Background"
              subtopics:
                - "Causes - Brahmanical orthodoxy, Varna rigidity"
                - "Shramana tradition & 62 heterodox sects"
                - "Ajivikas - Makkhali Gosala, determinism"
                - "Charvakas - Materialism philosophy"
              key_concepts: ["Shramana", "Heterodox", "Ajivikas", "Charvakas", "Lokayata"]
              exam_focus: "PRELIMS"
              previous_year_refs: ["UPSC 2016 - Heterodox sects"]

            - part: 12
              title: "Jainism - Mahavira & Core Teachings"
              subtopics:
                - "Life of Mahavira - 24th Tirthankara"
                - "Five vows - Ahimsa, Satya, Asteya, Aparigraha, Brahmacharya"
                - "Tri-ratna - Right faith, knowledge, conduct"
                - "Anekantavada & Syadvada philosophy"
              key_concepts: ["Mahavira", "Tri-ratna", "Anekantavada", "Panchamahavrata"]
              exam_focus: "BOTH"
              previous_year_refs: ["UPSC 2019 - Jain philosophy"]

            - part: 13
              title: "Jainism - Councils, Sects & Literature"
              subtopics:
                - "Jain Councils - Pataliputra & Vallabhi"
                - "Digambara vs Shvetambara split"
                - "Jain literature - Agamas, Angas"
                - "Contribution to art, architecture & Indian culture"
              key_concepts: ["Digambara", "Shvetambara", "Agamas", "Jain Councils"]
              exam_focus: "PRELIMS"
              previous_year_refs: ["UPSC 2018 - Jain sects"]

            - part: 14
              title: "Buddhism - Life & Teachings of Buddha"
              subtopics:
                - "Life of Siddhartha Gautama - birth to Mahaparinirvana"
                - "Four Noble Truths & Noble Eightfold Path"
                - "Middle Path - avoiding extremes"
                - "Concept of Nirvana, Pratityasamutpada (Dependent Origination)"
              key_concepts: ["Four Noble Truths", "Eightfold Path", "Middle Path", "Nirvana"]
              exam_focus: "BOTH"
              previous_year_refs: ["UPSC 2021 - Buddhist teachings"]

            - part: 15
              title: "Buddhism - Councils, Sects & Spread"
              subtopics:
                - "Four Buddhist Councils - Rajgriha to Kundalvana"
                - "Hinayana vs Mahayana vs Vajrayana"
                - "Buddhist Sangha & Vinaya Pitaka rules"
                - "Spread of Buddhism - Ashoka, Kanishka, Silk Route"
              key_concepts: ["Buddhist Councils", "Hinayana", "Mahayana", "Tripitaka", "Sangha"]
              exam_focus: "BOTH"
              previous_year_refs: ["UPSC 2020 - Buddhist councils", "UPSC 2017 - Buddhist sects"]

            - part: 16
              title: "Buddhist Literature, Art & Architecture"
              subtopics:
                - "Tripitaka - Vinaya, Sutta, Abhidhamma Pitaka"
                - "Jataka tales & Milindapanha"
                - "Buddhist architecture - Stupas, Chaityas, Viharas"
                - "Important sites - Sanchi, Bharhut, Amaravati, Nalanda"
              key_concepts: ["Tripitaka", "Jataka", "Stupa", "Chaitya", "Vihara", "Nalanda"]
              exam_focus: "BOTH"
              previous_year_refs: ["UPSC 2019 - Buddhist architecture"]

        # --- Mahajanapadas & Magadha ---
        - name: "Mahajanapadas & Rise of Magadha"
          topics:
            - part: 17
              title: "Sixteen Mahajanapadas"
              subtopics:
                - "List of 16 Mahajanapadas & their capitals"
                - "Monarchies vs Republics (Ganas/Sanghas)"
                - "Vajji Confederacy - republican model"
                - "Rise of urbanization & second urbanization"
              key_concepts: ["Mahajanapadas", "Vajji", "Gana-Sangha", "Second Urbanization"]
              exam_focus: "PRELIMS"
              previous_year_refs: ["UPSC 2018 - Mahajanapadas list"]

            - part: 18
              title: "Rise of Magadha Empire"
              subtopics:
                - "Haryanka dynasty - Bimbisara & Ajatashatru"
                - "Shishunaga dynasty"
                - "Nanda dynasty - Mahapadma Nanda & Dhana Nanda"
                - "Factors behind Magadha's rise - geography, iron, elephants"
              key_concepts: ["Bimbisara", "Ajatashatru", "Nanda Dynasty", "Pataliputra"]
              exam_focus: "BOTH"
              previous_year_refs: ["UPSC 2017 - Magadha rise"]

            - part: 19
              title: "Alexander's Invasion & Its Impact"
              subtopics:
                - "Alexander's campaign in India (326 BCE)"
                - "Battle of Hydaspes - Alexander vs Porus"
                - "Why Alexander turned back"
                - "Impact - Greek influence, trade routes, political unity inspiration"
              key_concepts: ["Alexander", "Battle of Hydaspes", "Porus", "Indo-Greek contact"]
              exam_focus: "PRELIMS"
              previous_year_refs: ["UPSC 2016 - Alexander's invasion"]

        # --- Mauryan Empire ---
        - name: "Mauryan Empire"
          topics:
            - part: 20
              title: "Chandragupta Maurya & Kautilya's Arthashastra"
              subtopics:
                - "Rise of Chandragupta Maurya - overthrow of Nandas"
                - "Role of Chanakya/Kautilya"
                - "Arthashastra - statecraft, administration, economy"
                - "Seleucid War & treaty with Seleucus Nicator"
              key_concepts: ["Chandragupta", "Kautilya", "Arthashastra", "Megasthenes", "Indica"]
              exam_focus: "BOTH"
              previous_year_refs: ["UPSC 2020 - Arthashastra"]

            - part: 21
              title: "Ashoka the Great - Conquest & Transformation"
              subtopics:
                - "Ashoka's rise to power & early reign"
                - "Kalinga War (261 BCE) & its impact"
                - "Conversion to Buddhism - Dhamma policy"
                - "Ashoka's Dhamma - principles & propagation"
              key_concepts: ["Ashoka", "Kalinga War", "Dhamma", "Rock Edicts"]
              exam_focus: "BOTH"
              previous_year_refs: ["UPSC 2021 - Ashoka's Dhamma"]

            - part: 22
              title: "Ashoka's Edicts & Mauryan Administration"
              subtopics:
                - "Rock Edicts, Pillar Edicts, Minor Rock Edicts"
                - "Decipherment by James Prinsep"
                - "Mauryan administration - Provinces, Districts, Villages"
                - "Revenue system, espionage, military organization"
              key_concepts: ["Edicts", "James Prinsep", "Brahmi Script", "Mauryan Administration"]
              exam_focus: "BOTH"
              previous_year_refs: ["UPSC 2019 - Ashokan edicts"]

            - part: 23
              title: "Mauryan Economy, Society & Art"
              subtopics:
                - "Economy - Agriculture, trade, guilds (shrenis)"
                - "Society - Varna system, slavery, position of women"
                - "Mauryan art - Ashoka Pillars, Sarnath Lion Capital"
                - "Decline of Mauryan Empire - causes & successors"
              key_concepts: ["Shrenis", "Punch-marked coins", "Sarnath Capital", "Mauryan decline"]
              exam_focus: "BOTH"
              previous_year_refs: ["UPSC 2018 - Mauryan economy"]

        # --- Post-Mauryan Period ---
        - name: "Post-Mauryan Period"
          topics:
            - part: 24
              title: "Shunga, Kanva & Satavahana Dynasties"
              subtopics:
                - "Shunga dynasty - Pushyamitra Shunga, revival of Brahmanism"
                - "Kanva dynasty - brief rule"
                - "Satavahana dynasty - Deccan power"
                - "Gautamiputra Satakarni & contributions"
              key_concepts: ["Pushyamitra", "Satavahanas", "Gautamiputra Satakarni", "Deccan"]
              exam_focus: "PRELIMS"
              previous_year_refs: ["UPSC 2017 - Satavahana dynasty"]

            - part: 25
              title: "Indo-Greek, Saka & Parthian Rulers"
              subtopics:
                - "Indo-Greek rulers - Menander (Milinda)"
                - "Saka (Scythian) rulers - Rudradaman I"
                - "Parthian rulers - Gondophernes"
                - "Cultural impact - coins, art, astronomy"
              key_concepts: ["Menander", "Milindapanha", "Rudradaman", "Junagadh inscription"]
              exam_focus: "PRELIMS"
              previous_year_refs: ["UPSC 2019 - Indo-Greek rulers"]

            - part: 26
              title: "Kushan Empire & Kanishka"
              subtopics:
                - "Kushan dynasty origins - Yuezhi tribe"
                - "Kanishka - greatest Kushan ruler"
                - "Fourth Buddhist Council under Kanishka"
                - "Gandhara & Mathura schools of art"
              key_concepts: ["Kanishka", "Gandhara Art", "Mathura Art", "Silk Route", "Kushan coinage"]
              exam_focus: "BOTH"
              previous_year_refs: ["UPSC 2020 - Gandhara art"]

        # --- Sangam Age ---
        - name: "Sangam Age"
          topics:
            - part: 27
              title: "Sangam Age - Chera, Chola, Pandya"
              subtopics:
                - "Three Sangam assemblies - Madurai"
                - "Chera dynasty - Uthiyan Cheralathan, pepper trade"
                - "Chola dynasty - Karikala, Puhar (Kaveripattinam)"
                - "Pandya dynasty - Nedunjeliyan, pearls & trade"
              key_concepts: ["Sangam Literature", "Thinai system", "Tolkappiyam", "Silappadikaram"]
              exam_focus: "BOTH"
              previous_year_refs: ["UPSC 2018 - Sangam age"]

            - part: 28
              title: "Sangam Literature, Society & Economy"
              subtopics:
                - "Sangam literature - Ettuthokai & Pattupattu"
                - "Tolkappiyam - grammar text"
                - "Five Thinai (landscape-based classification)"
                - "Trade with Rome - Periplus, Pliny's accounts"
              key_concepts: ["Ettuthokai", "Pattupattu", "Thinai", "Roman Trade", "Periplus"]
              exam_focus: "BOTH"
              previous_year_refs: ["UPSC 2019 - Sangam literature"]

        # --- Gupta Empire ---
        - name: "Gupta Empire"
          topics:
            - part: 29
              title: "Gupta Empire - Foundation & Expansion"
              subtopics:
                - "Sri Gupta & Ghatotkacha - founders"
                - "Chandragupta I - first great Gupta ruler"
                - "Samudragupta - 'Napoleon of India', Prayag Prashasti"
                - "Military campaigns & policy of Digvijay"
              key_concepts: ["Samudragupta", "Prayag Prashasti", "Harishena", "Digvijay"]
              exam_focus: "BOTH"
              previous_year_refs: ["UPSC 2020 - Samudragupta"]

            - part: 30
              title: "Chandragupta II & Gupta Administration"
              subtopics:
                - "Chandragupta II Vikramaditya - golden age"
                - "Conquest of Shakas, Navaratna court"
                - "Fa Hien's visit & account"
                - "Administrative system - provinces, districts, villages"
              key_concepts: ["Vikramaditya", "Fa Hien", "Navaratna", "Gupta Administration"]
              exam_focus: "BOTH"
              previous_year_refs: ["UPSC 2018 - Gupta administration"]

            - part: 31
              title: "Gupta Age - Science, Literature & Learning"
              subtopics:
                - "Aryabhata - mathematics & astronomy"
                - "Varahamihira - Brihat Samhita"
                - "Kalidasa - Shakuntala, Meghaduta"
                - "Nalanda & Vikramashila universities"
              key_concepts: ["Aryabhata", "Kalidasa", "Nalanda", "Decimal system", "Zero concept"]
              exam_focus: "BOTH"
              previous_year_refs: ["UPSC 2021 - Gupta era science"]

            - part: 32
              title: "Gupta Art, Architecture & Decline"
              subtopics:
                - "Gupta temple architecture - Dashavatara, Tigawa"
                - "Ajanta & Ellora caves (Gupta phase)"
                - "Iron Pillar of Delhi - metallurgical marvel"
                - "Decline - Hunas invasion, internal weaknesses"
              key_concepts: ["Ajanta", "Iron Pillar", "Gupta Temples", "Huna invasion"]
              exam_focus: "BOTH"
              previous_year_refs: ["UPSC 2019 - Gupta architecture"]

        # --- Post-Gupta Period ---
        - name: "Post-Gupta & Regional Kingdoms"
          topics:
            - part: 33
              title: "Harsha & Post-Gupta North India"
              subtopics:
                - "Pushyabhuti dynasty - Harsha of Kannauj"
                - "Harshacharita by Banabhatta"
                - "Xuanzang (Hiuen Tsang) - Chinese traveler's account"
                - "Harsha's administration, Kanauj Assembly, decline"
              key_concepts: ["Harsha", "Banabhatta", "Xuanzang", "Kanauj Assembly"]
              exam_focus: "BOTH"
              previous_year_refs: ["UPSC 2017 - Harsha's reign"]

            - part: 34
              title: "Chalukyas of Badami"
              subtopics:
                - "Pulakeshin I - founder"
                - "Pulakeshin II - defeated Harsha, Aihole inscription"
                - "Chalukya art - Aihole, Badami, Pattadakal temples"
                - "Vesara style of architecture"
              key_concepts: ["Pulakeshin II", "Aihole Inscription", "Vesara Style", "Pattadakal"]
              exam_focus: "BOTH"
              previous_year_refs: ["UPSC 2018 - Chalukya art"]

            - part: 35
              title: "Pallava Dynasty"
              subtopics:
                - "Pallava origins & key rulers"
                - "Mahendravarman I & Narasimhavarman I (Mamallapuram)"
                - "Shore Temple & Pancha Rathas"
                - "Pallava architecture - rock-cut to structural temples"
              key_concepts: ["Mamallapuram", "Shore Temple", "Pancha Rathas", "Pallava art"]
              exam_focus: "BOTH"
              previous_year_refs: ["UPSC 2020 - Pallava architecture"]

            - part: 36
              title: "Rashtrakuta Dynasty"
              subtopics:
                - "Dantidurga - founder"
                - "Krishna I - Kailasa Temple at Ellora"
                - "Amoghavarsha - Jain scholar, Kavirajamarga"
                - "Rashtrakuta contribution to art & culture"
              key_concepts: ["Kailasa Temple", "Ellora", "Amoghavarsha", "Kavirajamarga"]
              exam_focus: "BOTH"
              previous_year_refs: ["UPSC 2019 - Kailasa temple"]

        # --- South Indian Dynasties ---
        - name: "South Indian Dynasties"
          topics:
            - part: 37
              title: "Chola Empire - Rise & Administration"
              subtopics:
                - "Vijayalaya - founder of Imperial Cholas"
                - "Rajaraja Chola I - conquests, Brihadeshwara Temple"
                - "Rajendra Chola I - Gangaikonda Cholapuram, naval expeditions"
                - "Chola administration - Ur, Sabha, Nagaram (local self-government)"
              key_concepts: ["Rajaraja I", "Rajendra I", "Brihadeshwara", "Chola Local Govt"]
              exam_focus: "BOTH"
              previous_year_refs: ["UPSC 2021 - Chola administration"]

            - part: 38
              title: "Chola Art, Economy & Maritime Trade"
              subtopics:
                - "Chola bronze sculptures - Nataraja"
                - "Temple architecture - Dravidian style"
                - "Maritime trade - Southeast Asia connections"
                - "Chola inscriptions - Uttaramerur inscription"
              key_concepts: ["Nataraja Bronze", "Dravidian Architecture", "Uttaramerur", "SE Asian trade"]
              exam_focus: "BOTH"
              previous_year_refs: ["UPSC 2020 - Chola bronzes"]

            - part: 39
              title: "Chalukyas of Kalyani & Hoysalas"
              subtopics:
                - "Western Chalukyas of Kalyani"
                - "Hoysala dynasty - Vishnuvardhana"
                - "Hoysala temples - Belur, Halebid, Somnathpur"
                - "Star-shaped temple platform, intricate carvings"
              key_concepts: ["Hoysala Temples", "Belur", "Halebid", "Soapstone carvings"]
              exam_focus: "PRELIMS"
              previous_year_refs: ["UPSC 2018 - Hoysala architecture"]

            - part: 40
              title: "Pandya Revival & Kakatiya Dynasty"
              subtopics:
                - "Later Pandya dynasty revival"
                - "Kakatiya dynasty - Warangal, Rudramadevi"
                - "Kakatiya architecture - Thousand Pillar Temple"
                - "Eastern Ganga dynasty - Konark Sun Temple"
              key_concepts: ["Rudramadevi", "Warangal Fort", "Konark", "Thousand Pillar Temple"]
              exam_focus: "PRELIMS"
              previous_year_refs: ["UPSC 2019 - Konark temple"]

        # --- Ancient Indian Culture ---
        - name: "Ancient Indian Culture & Society"
          topics:
            - part: 41
              title: "Ancient Indian Art & Sculpture"
              subtopics:
                - "Evolution of sculpture - Mauryan to Gupta"
                - "Gandhara vs Mathura vs Amaravati schools"
                - "Buddhist, Hindu & Jain sculpture traditions"
                - "Terracotta, ivory & metal works"
              key_concepts: ["Gandhara School", "Mathura School", "Amaravati School", "Greco-Buddhist art"]
              exam_focus: "BOTH"
              previous_year_refs: ["UPSC 2020 - Sculpture schools comparison"]

            - part: 42
              title: "Ancient Architecture - Temples & Caves"
              subtopics:
                - "Rock-cut caves - Barabar, Ajanta, Ellora, Elephanta"
                - "Nagara vs Dravidian vs Vesara temple styles"
                - "Evolution from rock-cut to structural temples"
                - "Important temple sites across India"
              key_concepts: ["Nagara Style", "Dravidian Style", "Vesara Style", "Rock-cut Architecture"]
              exam_focus: "BOTH"
              previous_year_refs: ["UPSC 2021 - Temple architecture styles"]

            - part: 43
              title: "Ancient Indian Literature"
              subtopics:
                - "Sanskrit literature - Ramayana, Mahabharata, Puranas"
                - "Pali & Prakrit literature"
                - "Tamil Sangam literature"
                - "Scientific texts - Arthashastra, Charaka Samhita, Sushruta Samhita"
              key_concepts: ["Ramayana", "Mahabharata", "Arthashastra", "Charaka", "Sushruta"]
              exam_focus: "BOTH"
              previous_year_refs: ["UPSC 2018 - Ancient literature"]

            - part: 44
              title: "Ancient Indian Science & Technology"
              subtopics:
                - "Mathematics - Aryabhata, Brahmagupta, zero & decimal"
                - "Astronomy - Surya Siddhanta, heliocentric ideas"
                - "Medicine - Ayurveda, surgery (Sushruta)"
                - "Metallurgy - Wootz steel, zinc extraction, Iron Pillar"
              key_concepts: ["Aryabhata", "Brahmagupta", "Ayurveda", "Wootz Steel"]
              exam_focus: "BOTH"
              previous_year_refs: ["UPSC 2019 - Ancient Indian science"]

            - part: 45
              title: "Ancient Indian Philosophy - Six Schools"
              subtopics:
                - "Samkhya (Kapila), Yoga (Patanjali)"
                - "Nyaya (Gautama), Vaisheshika (Kanada)"
                - "Mimamsa (Jaimini), Vedanta (Badarayana/Shankaracharya)"
                - "Comparison of orthodox & heterodox schools"
              key_concepts: ["Shad Darshana", "Samkhya", "Yoga", "Nyaya", "Vedanta"]
              exam_focus: "BOTH"
              previous_year_refs: ["UPSC 2020 - Indian philosophy schools"]

            - part: 46
              title: "Social Life in Ancient India"
              subtopics:
                - "Varna & Jati system - evolution & rigidity"
                - "Position of women across periods"
                - "Education system - Gurukula, universities"
                - "Family structure, marriage customs, food habits"
