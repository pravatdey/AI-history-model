# AI History Video Generator - Main Configuration

# Application Settings
app:
  name: "AI History Video Generator"
  version: "1.0.0"
  debug: false
  log_level: "INFO"
  type: "history_course"

# Video Settings
video:
  duration_target: 2            # Target 2 minutes per class
  duration_min: 2              # Minimum video duration in minutes
  duration_max: 3              # Maximum video duration in minutes
  resolution:
    width: 1280
    height: 720
  fps: 30
  format: "mp4"
  codec: "libx264"
  bitrate: "1500k"
  preset: "ultrafast"
  threads: 8

# Language Configuration - Hinglish (Hindi-English mix)
languages:
  default: "hi"
  supported:
    - code: "hi"
      name: "Hinglish"
      tts_voice: "hi-IN-MadhurNeural"      # Free Edge TTS - Indian Hindi male voice
      tts_rate: "-8%"                    # Slightly slower for natural conversational feel
      tts_pitch: "-2Hz"                  # Slightly deeper for authoritative tone

# LLM Configuration
llm:
  provider: "groq"

  # Groq settings (free cloud LLM)
  groq:
    api_key: ""                          # Set via environment variable GROQ_API_KEY
    model: "llama-3.3-70b-versatile"
    temperature: 0.6                     # Slightly lower for factual accuracy
    max_tokens: 8000                     # Higher for 15-min scripts (LLMs need token headroom)

  # Ollama settings (local LLM fallback)
  ollama:
    host: "http://localhost:11434"
    model: "llama2"
    temperature: 0.6
    max_tokens: 8000

# Script Generation
script:
  words_per_minute: 140                  # Speaking pace for educational content
  target_word_count: 700                 # ~5 minutes at 140 WPM (testing)
  min_word_count: 420                    # Minimum words (~3 min) - retry if below this
  max_key_points_per_section: 4
  lesson_structure:
    intro_pct: 0.10                      # 10% intro (~1.5 min)
    main_content_pct: 0.75              # 75% main content (~11 min)
    exam_corner_pct: 0.10               # 10% exam corner (~1.5 min)
    summary_pct: 0.05                    # 5% summary (~0.5 min)

# Text-to-Speech Configuration
tts:
  provider: "edge"
  output_format: "mp3"

  edge:
    rate: "-8%"                          # Natural conversational pace
    pitch: "-2Hz"                        # Slightly deeper for human-like authority
    volume: "+5%"                        # Slightly louder for presence

  audio:
    normalize: true
    noise_reduction: false
    target_loudness: -14                 # LUFS for YouTube
    clarity_boost: true
    compressor: true
    warmth_boost: true                   # Add warmth for natural voice

# Avatar Configuration
avatar:
  provider: "audio2face3d"               # "audio2face3d", "moda", "multitalk", "sadtalker_hf", "sadtalker", "wav2lip", "simple", "auto"

  default_image: "news_anchor.png"       # Reuse current affairs avatar (used by 2D engines)

  # NVIDIA Audio2Face-3D - 3D Digital Human (best quality, free Cloud API)
  # API: https://build.nvidia.com/nvidia/audio2face-3d/api
  # Pipeline: Audio → NVIDIA gRPC API → Blendshapes → Blender 3D Render → MP4
  audio2face3d:
    nvidia_api_key: ""                     # Set NVIDIA_API_KEY env var (free from build.nvidia.com)
    character: "james"                     # "mark", "claire", "james" (NVIDIA built-in 3D characters)
    blender_path: ""                       # Set BLENDER_PATH env var (e.g. C:\Program Files\Blender Foundation\Blender 5.1\blender.exe)
    render_resolution_x: 720              # Render width (px)
    render_resolution_y: 720              # Render height (px)
    render_fps: 30                         # Render frame rate
    background_color: "0.12,0.15,0.22"    # Dark studio blue (R,G,B 0-1)
    max_retries: 3
    retry_delay: 10
    emotion_joy: 0.3                       # Base joy level for teacher character (0-1)

  # MoDA Fast Talking Head - Best quality realistic avatar (2025) [FALLBACK]
  # HF Space: https://huggingface.co/spaces/multimodalart/MoDA-fast-talking-head
  # Free ZeroGPU, excellent lip sync + emotion control
  moda:
    hf_space_id: "multimodalart/MoDA-fast-talking-head"
    hf_token: ""                           # Set HF_TOKEN env var or paste here (HF Pro = priority GPU)
    emotion: "None"                        # Anger, Contempt, Disgust, Fear, Happiness, Neutral, Sadness, Surprise, None
    cfg_scale: 1.2                         # Guidance scale (1.0-3.0)
    max_chunk_seconds: 30                  # ZeroGPU 120s timeout, 30s audio is safe
    max_retries: 3
    retry_delay: 10

  # MeiGen MultiTalk - Best quality lip-sync (NeurIPS 2025)
  # GitHub: https://github.com/MeiGen-AI/MultiTalk
  # Two modes: "hf_space" (free, no GPU) or "local" (requires CUDA GPU)
  multitalk:
    execution_mode: "hf_space"           # "hf_space" (free API) or "local" (needs CUDA GPU)

    # HuggingFace Space settings (free, no GPU needed)
    # Multiple spaces to try in order (fallback if one is broken)
    hf_space_ids:
      - "Benesp/Meigen-MultiTalk"
      - "martylabs/Meigen-MultiTalk"
      - "arunabks/Meigen-MultiTalk"
      - "fffiloni/Meigen-MultiTalk"
    hf_space_id: "Benesp/Meigen-MultiTalk"    # Primary space
    hf_sample_steps: 12                  # Sampling steps for HF Space (12 = fast default)
    max_chunk_seconds: 60                # Max audio per HF Space call (60s safe limit)
    max_retries: 3                       # Retry failed chunks before giving up
    retry_delay: 10                      # Seconds between retries

    # Local mode settings (only used when execution_mode: "local")
    path: ""                             # Set MULTITALK_PATH env var or path here
    ckpt_dir: ""                         # Path to Wan2.1-I2V-14B-480P weights
    wav2vec_dir: ""                      # Path to chinese-wav2vec2-base weights
    size: "multitalk-480"                # "multitalk-480" or "multitalk-720"
    mode: "streaming"                    # "streaming" (long video) or "clip" (short)
    sample_steps: 40                     # Sampling steps (reduce to 10 for speed)
    use_teacache: true                   # TeaCache acceleration (~2-3x speedup)
    teacache_thresh: 0.3                 # Acceleration coefficient (0.2-0.5 optimal)
    use_apg: false                       # Reduce color inconsistency in long videos
    text_guide_scale: 5.0                # Text guidance scale
    audio_guide_scale: 4.0               # Audio guidance scale (3-5 for lip sync)
    low_vram: false                      # Enable for single RTX 4090 (480P)
    num_gpus: 1                          # Number of GPUs for inference

    prompt: "A professional Indian male teacher is speaking directly to the camera in a studio setting. He maintains eye contact, has natural head movements, and speaks with clear lip movements synchronized to the audio. The background is clean and professional."

  # SadTalker HF Space - Free lip-sync via HuggingFace API
  # HF Space: https://huggingface.co/spaces/vinthony/SadTalker
  # Free, no GPU needed. Auto-chunks long audio into 30s segments.
  sadtalker_hf:
    hf_space_id: "vinthony/SadTalker"
    preprocess: "crop"                   # crop, resize, full, extcrop, extfull
    size_of_image: 512                   # 256 or 512
    still_mode: true                     # Less head movement (teacher style)
    enhancer: true                       # GFPGAN face enhancement
    pose_style: 0                        # 0-45
    exp_weight: 1.0                      # Expression scale (0-3)
    batch_size: 1
    facerender: "facevid2vid"            # facevid2vid or pirender
    blink_every: true
    max_chunk_seconds: 30.0              # Chunk audio for free ZeroGPU quota

  sadtalker:
    preprocess: "crop"
    still_mode: false
    use_enhancer: false
    batch_size: 2
    expression_scale: 1.0

  wav2lip:
    resize_factor: 1
    nosmooth: false
    pads: [0, 10, 0, 0]

# Video Composition
composition:
  background:
    type: "solid"
    color: "#000000"                     # Pure black background

  presentation_slides:
    enabled: true
    content_start_x_pct: 0.30           # Right panel starts at 30% - left 30% reserved for avatar
    transition_duration: 0.5
    max_key_points: 4
    show_subject_badge: true
    show_terms_as_badges: true
    bullet_style: "numbered"

  avatar:
    position: "overlay_left"             # Avatar overlays on left zone of slides
    scale: 0.65                          # Avatar height as fraction of video height (taller to fill left zone)
    x_offset: 10                         # Pixels from left edge
    transparent_bg: true                 # Remove avatar background, show only the person

  text:
    headline:
      enabled: false                     # No headline for history lessons
    ticker:
      enabled: false                     # No ticker for history lessons

  intro:
    enabled: false
    duration: 4
    text: "History Class"
    animation: "fade"

  outro:
    enabled: true
    duration: 5
    text: "See you in the next class!"
    animation: "fade"

  music:
    enabled: true
    file: "background_calm.mp3"
    volume: 0.08                         # Quieter for educational content

# Thumbnail Settings
thumbnail:
  width: 1280
  height: 720
  format: "jpeg"
  style: "history_class"
  background_image: "thumbnail.jpeg"               # Custom background image path (leave empty for generated BG)

  text:
    enabled: true
    max_chars: 60
    font: "Arial-Bold"
    size: 72
    color: "#ffffff"
    stroke_color: "#000000"
    stroke_width: 3

  effects:
    gradient_overlay: true
    vignette: true

# YouTube Settings
youtube:
  upload:
    privacy_status: "private"
    category_id: "27"                    # Education
    default_language: "hi"
    made_for_kids: false

# Syllabus Configuration
syllabus:
  path: "config/syllabus.yaml"
  target_parts: 180
  target_months: 6

# Scheduling
schedule:
  enabled: true
  time: "14:00"                          # 2:00 PM IST (different from current affairs)
  timezone: "Asia/Kolkata"
  days:
    - 0  # Monday
    - 1  # Tuesday
    - 2  # Wednesday
    - 3  # Thursday
    - 4  # Friday
    - 5  # Saturday
    - 6  # Sunday

# Database
database:
  type: "sqlite"
  path: "data/history_tracker.db"

# Output Paths
paths:
  output: "output"
  audio: "output/audio"
  videos: "output/videos"
  thumbnails: "output/thumbnails"
  notes: "output/notes"
  temp: "output/temp"
  logs: "logs"
