# AI History Video Generator - Main Configuration

# Application Settings
app:
  name: "AI History Video Generator"
  version: "1.0.0"
  debug: false
  log_level: "INFO"
  type: "history_course"

# Video Settings
video:
  duration_target: 15          # Target 15 minutes per class
  duration_min: 13             # Minimum video duration in minutes
  duration_max: 20             # Maximum video duration in minutes
  resolution:
    width: 1280
    height: 720
  fps: 30
  format: "mp4"
  codec: "libx264"
  bitrate: "1500k"
  preset: "ultrafast"
  threads: 8

# Language Configuration - Hinglish (Hindi-English mix)
languages:
  default: "hi"
  supported:
    - code: "hi"
      name: "Hinglish"
      tts_voice: "hi-IN-MadhurNeural"   # Natural Indian male voice
      tts_rate: "-8%"                    # Slightly slower for natural conversational feel
      tts_pitch: "-2Hz"                  # Slightly deeper for authoritative tone

# LLM Configuration
llm:
  provider: "groq"

  # Groq settings (free cloud LLM)
  groq:
    api_key: ""                          # Set via environment variable GROQ_API_KEY
    model: "llama-3.3-70b-versatile"
    temperature: 0.6                     # Slightly lower for factual accuracy
    max_tokens: 8000                     # Higher for 15-min scripts (LLMs need token headroom)

  # Ollama settings (local LLM fallback)
  ollama:
    host: "http://localhost:11434"
    model: "llama2"
    temperature: 0.6
    max_tokens: 8000

# Script Generation
script:
  words_per_minute: 140                  # Speaking pace for educational content
  target_word_count: 2100                # ~15 minutes at 140 WPM
  min_word_count: 1800                   # Minimum words (~13 min) - retry if below this
  max_key_points_per_section: 4
  lesson_structure:
    intro_pct: 0.10                      # 10% intro (~1.5 min)
    main_content_pct: 0.75              # 75% main content (~11 min)
    exam_corner_pct: 0.10               # 10% exam corner (~1.5 min)
    summary_pct: 0.05                    # 5% summary (~0.5 min)

# Text-to-Speech Configuration
tts:
  provider: "edge"
  output_format: "mp3"

  edge:
    rate: "-8%"                          # Natural conversational pace
    pitch: "-2Hz"                        # Slightly deeper for human-like authority
    volume: "+5%"                        # Slightly louder for presence

  audio:
    normalize: true
    noise_reduction: false
    target_loudness: -14                 # LUFS for YouTube
    clarity_boost: true
    compressor: true
    warmth_boost: true                   # Add warmth for natural voice

# Avatar Configuration
avatar:
  provider: "sadtalker"

  default_image: "news_anchor.png"       # Reuse current affairs avatar

  sadtalker:
    preprocess: "crop"
    still_mode: false
    use_enhancer: false
    batch_size: 2
    expression_scale: 1.0

  wav2lip:
    resize_factor: 1
    nosmooth: false
    pads: [0, 10, 0, 0]

# Video Composition
composition:
  background:
    type: "solid"
    color: "#000000"                     # Pure black background

  presentation_slides:
    enabled: true
    content_start_x_pct: 0.30           # Right panel starts at 30% - left 30% reserved for avatar
    transition_duration: 0.5
    max_key_points: 4
    show_subject_badge: true
    show_terms_as_badges: true
    bullet_style: "numbered"

  avatar:
    position: "overlay_left"             # Avatar overlays on left zone of slides
    scale: 0.65                          # Avatar height as fraction of video height (taller to fill left zone)
    x_offset: 10                         # Pixels from left edge
    transparent_bg: true                 # Remove avatar background, show only the person

  text:
    headline:
      enabled: false                     # No headline for history lessons
    ticker:
      enabled: false                     # No ticker for history lessons

  intro:
    enabled: false
    duration: 4
    text: "History Class"
    animation: "fade"

  outro:
    enabled: true
    duration: 5
    text: "See you in the next class!"
    animation: "fade"

  music:
    enabled: true
    file: "background_calm.mp3"
    volume: 0.08                         # Quieter for educational content

# Thumbnail Settings
thumbnail:
  width: 1280
  height: 720
  format: "jpeg"
  style: "history_class"
  background_image: "thumbnail.jpeg"               # Custom background image path (leave empty for generated BG)

  text:
    enabled: true
    max_chars: 60
    font: "Arial-Bold"
    size: 72
    color: "#ffffff"
    stroke_color: "#000000"
    stroke_width: 3

  effects:
    gradient_overlay: true
    vignette: true

# YouTube Settings
youtube:
  upload:
    privacy_status: "public"
    category_id: "27"                    # Education
    default_language: "hi"
    made_for_kids: false

# Syllabus Configuration
syllabus:
  path: "config/syllabus.yaml"
  target_parts: 180
  target_months: 6

# Scheduling
schedule:
  enabled: true
  time: "14:00"                          # 2:00 PM IST (different from current affairs)
  timezone: "Asia/Kolkata"
  days:
    - 0  # Monday
    - 1  # Tuesday
    - 2  # Wednesday
    - 3  # Thursday
    - 4  # Friday
    - 5  # Saturday
    - 6  # Sunday

# Database
database:
  type: "sqlite"
  path: "data/history_tracker.db"

# Output Paths
paths:
  output: "output"
  audio: "output/audio"
  videos: "output/videos"
  thumbnails: "output/thumbnails"
  notes: "output/notes"
  temp: "output/temp"
  logs: "logs"
