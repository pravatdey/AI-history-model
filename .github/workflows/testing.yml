name: Testing - History Video Generator

on:
  # Runs on every push to testing branch
  push:
    branches:
      - testing

  # Allow manual trigger on testing branch
  workflow_dispatch:
    inputs:
      part_number:
        description: 'Specific part number to generate (leave empty for next pending)'
        required: false
        default: ''
        type: string

env:
  PYTHON_VERSION: '3.11'

jobs:
  test-generate-video:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg libsndfile1 imagemagick

      - name: Install Blender (for Audio2Face-3D 3D rendering)
        run: |
          sudo snap install blender --classic
          echo "BLENDER_PATH=$(which blender)" >> $GITHUB_ENV
          blender --version

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install https://github.com/NVIDIA/Audio2Face-3D-Samples/raw/main/proto/sample_wheel/nvidia_ace-1.2.0-py3-none-any.whl

      - name: Create necessary directories
        run: |
          mkdir -p output/audio output/videos output/thumbnails output/notes output/temp
          mkdir -p data logs config assets/avatars

      - name: Setup environment file
        run: |
          echo "GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}" > .env
          echo "HF_TOKEN=${{ secrets.HF_TOKEN }}" >> .env
          echo "NVIDIA_API_KEY=${{ secrets.NVIDIA_API_KEY }}" >> .env
          echo "BLENDER_PATH=$(which blender)" >> .env
          echo "TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}" >> .env
          echo "TELEGRAM_CHAT_ID=${{ secrets.TELEGRAM_CHAT_ID }}" >> .env

      - name: Setup YouTube credentials
        env:
          YOUTUBE_TOKEN_SECRET: ${{ secrets.YOUTUBE_TOKEN }}
          YOUTUBE_CLIENT_SECRETS_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRETS }}
        run: |
          python3 -c "
          import os, json, sys, base64

          def parse_secret(name, value):
              if not value:
                  print(f'ERROR: {name} secret is empty')
                  sys.exit(1)
              try:
                  return json.loads(value)
              except json.JSONDecodeError:
                  pass
              try:
                  return json.loads(base64.b64decode(value).decode('utf-8'))
              except Exception:
                  pass
              try:
                  return json.loads(value.strip().strip(\"'\"))
              except Exception as e:
                  print(f'ERROR: Cannot parse {name} as JSON or base64-JSON: {e}')
                  sys.exit(1)

          token_data = parse_secret('YOUTUBE_TOKEN', os.environ['YOUTUBE_TOKEN_SECRET'])
          with open('config/youtube_token.json', 'w') as f:
              json.dump(token_data, f, indent=2)
          required = ['token', 'refresh_token', 'token_uri', 'client_id', 'client_secret']
          missing = [k for k in required if not token_data.get(k)]
          if missing:
              print(f'WARNING: youtube_token.json is missing fields: {missing}')
          else:
              print('YouTube token written and validated successfully')

          secrets_val = os.environ.get('YOUTUBE_CLIENT_SECRETS_SECRET', '')
          if secrets_val:
              secrets_data = parse_secret('YOUTUBE_CLIENT_SECRETS', secrets_val)
              with open('config/client_secrets.json', 'w') as f:
                  json.dump(secrets_data, f, indent=2)
              print('Client secrets written successfully')
          "
        continue-on-error: false

      - name: Restore database from cache
        uses: actions/cache@v4
        with:
          path: data/history_tracker.db
          key: history-db-testing-${{ github.run_number }}
          restore-keys: |
            history-db-testing-

      - name: Run pipeline (TESTING - upload as private)
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          BLENDER_PATH: ${{ env.BLENDER_PATH }}
        run: |
          PART_ARG=""
          if [ -n "${{ github.event.inputs.part_number }}" ]; then
            PART_ARG="--part ${{ github.event.inputs.part_number }}"
          fi

          # Always upload as private in testing mode
          python main.py --test $PART_ARG

      - name: Save database to cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: data/history_tracker.db
          key: history-db-testing-${{ github.run_number }}

      - name: Upload video artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-video-${{ github.run_number }}
          path: |
            output/videos/*_final.mp4
            output/thumbnails/*.png
            output/notes/*.pdf
            output/*_script.txt
            logs/*.log
          retention-days: 3

      - name: Send Telegram notification
        if: always() && env.TELEGRAM_BOT_TOKEN != ''
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          STATUS="${{ job.status }}"
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d text="[TESTING] History video ${STATUS}! Run #${{ github.run_number }}"
